<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎆 Claude finished!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
    canvas { position: fixed; inset: 0; }
    .msg {
      position: relative;
      z-index: 10;
      text-align: center;
      color: #fff;
      pointer-events: none;
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    .msg .emoji { font-size: 4rem; display: block; margin-bottom: 0.5rem; }
    .msg h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
    .msg p { margin-top: 0.4rem; font-size: 1rem; opacity: 0.6; }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="msg">
    <span class="emoji">🥑</span>
    <h1>Claude has finished!</h1>
    <p>Go check your results.</p>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const COLORS = [
      '#ff6b6b','#ffd93d','#6bcb77','#4d96ff',
      '#ff922b','#cc5de8','#f06595','#74c0fc',
      '#ffffff','#ffe066',
    ];

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 12;
        this.vy = (Math.random() - 0.7) * 14;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.size = Math.random() * 6 + 3;
        this.gravity = 0.35;
        this.drag = 0.98;
        this.alpha = 1;
        this.fade = Math.random() * 0.015 + 0.008;
        this.shape = Math.random() < 0.5 ? 'rect' : 'circle';
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.2;
      }
      update() {
        this.vx *= this.drag;
        this.vy *= this.drag;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += this.rotSpeed;
        this.alpha -= this.fade;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.fillStyle = this.color;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        if (this.shape === 'rect') {
          ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size * 0.5);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function burst(x, y, count = 80) {
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y));
      }
    }

    function launchShow() {
      const spots = [
        [W * 0.2, H * 0.35],
        [W * 0.5, H * 0.25],
        [W * 0.8, H * 0.35],
        [W * 0.35, H * 0.5],
        [W * 0.65, H * 0.5],
      ];
      spots.forEach(([x, y], i) => {
        setTimeout(() => burst(x, y, 100), i * 180);
      });
    }
    launchShow();
    setInterval(launchShow, 3000);

    function loop() {
      ctx.fillStyle = 'rgba(10, 10, 26, 0.18)';
      ctx.fillRect(0, 0, W, H);
      particles = particles.filter(p => p.alpha > 0);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }
    loop();

    setTimeout(() => window.close(), 8000);
  </script>
</body>
</html>
