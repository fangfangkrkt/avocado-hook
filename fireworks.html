<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🥑 Claude finished!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      -webkit-user-select: none;
    }
    .avo {
      position: fixed;
      pointer-events: none;
    }
    @keyframes fall {
      0%   { transform: translateY(-80px) rotate(var(--r0)); opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(calc(100vh + 80px)) rotate(var(--r1)); opacity: 0; }
    }
    .msg {
      position: relative;
      z-index: 10;
      text-align: center;
      color: #fff;
      pointer-events: none;
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    .msg .emoji { font-size: 4rem; display: block; margin-bottom: 0.5rem; }
    .msg h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
    .msg p { margin-top: 0.4rem; font-size: 1rem; opacity: 0.6; }
    .close-hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      color: rgba(255,255,255,0.35);
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
    }
    .close-hint.visible { opacity: 1; }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="msg">
    <span class="emoji">🥑</span>
    <h1>Claude has finished!</h1>
    <p>Go check your results.</p>
  </div>
  <div class="close-hint" id="hint">Done — close this tab to continue</div>
  <script>
    function avoSVG(size) {
      const s = size;
      return `<svg width="${s}" height="${Math.round(s*1.3)}" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
      <path d="M50,6 C59,6 75,19 80,36 C87,55 88,74 85,89 C81,106 70,116 50,117 C30,116 19,106 15,89 C12,74 13,55 20,36 C25,19 41,6 50,6 Z"
            fill="#4A8B28" stroke="#1B2E10" stroke-width="4.5" stroke-linejoin="round"/>
      <path d="M50,15 C58,15 71,26 76,42 C82,59 83,76 80,89 C77,102 67,110 50,111 C33,110 23,102 20,89 C17,76 18,59 24,42 C29,26 42,15 50,15 Z"
            fill="#C8E86A"/>
      <ellipse cx="50" cy="85" rx="25" ry="23" fill="#2C1108" stroke="#160804" stroke-width="2.5"/>
      <ellipse cx="50" cy="85" rx="21" ry="19" fill="#7B3C18"/>
      <ellipse cx="40" cy="77" rx="5" ry="6" fill="#B86C38" fill-opacity="0.5"/>
      <circle cx="44" cy="81" r="3.5" fill="#180808"/>
      <circle cx="45.5" cy="79.5" r="1.4" fill="white"/>
      <circle cx="56" cy="81" r="3.5" fill="#180808"/>
      <circle cx="57.5" cy="79.5" r="1.4" fill="white"/>
      <ellipse cx="39" cy="87" rx="5" ry="3" fill="#FF8FAB" fill-opacity="0.65"/>
      <ellipse cx="61" cy="87" rx="5" ry="3" fill="#FF8FAB" fill-opacity="0.65"/>
      <path d="M45,91 Q50,97 55,91" fill="none" stroke="#180808" stroke-width="2" stroke-linecap="round"/>
    </svg>`;
    }

    function dropWave(count = 40) {
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'avo';
          const size = 30 + Math.random() * 34;
          const x = Math.random() * window.innerWidth;
          const r0 = Math.random() * 360;
          const r1 = r0 + (Math.random() < 0.5 ? 1 : -1) * (180 + Math.random() * 360);
          const dur = 1.0 + Math.random() * 0.8;
          const parser = new DOMParser();
          const svgDoc = parser.parseFromString(avoSVG(Math.round(size)), 'image/svg+xml');
          el.appendChild(svgDoc.documentElement);
          el.style.cssText = `left:${x}px;top:-80px;--r0:${r0}deg;--r1:${r1}deg;animation:fall ${dur}s ease-in forwards`;
          document.body.appendChild(el);
          setTimeout(() => el.remove(), dur * 1000 + 200);
        }, i * 40 + Math.random() * 30);
      }
    }

    dropWave();
    setInterval(dropWave, 3000);

    setTimeout(() => document.getElementById('hint').classList.add('visible'), 4000);
  </script>
</body>
</html>
